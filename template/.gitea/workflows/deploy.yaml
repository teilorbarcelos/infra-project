name: CI/CD Pipeline
on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  PROJECT_NAME: "REPLACE_ME_PROJECT_NAME"

jobs:
  test-and-sonar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run tests
        run: echo "Running tests and linters..."
      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  build-and-deploy-develop:
    runs-on: ubuntu-latest
    needs: test-and-sonar
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      ENV_NAME: "develop"
      PORT_BACK: ${{ secrets.DEV_PORT_BACK }}
      PORT_FRONT: ${{ secrets.DEV_PORT_FRONT }}
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker Images
        run: |
          docker build -t ${PROJECT_NAME}-backend:${GITHUB_SHA} -f Dockerfile.backend . || echo "No backend dockerfile"
          docker build -t ${PROJECT_NAME}-frontend:${GITHUB_SHA} -f Dockerfile.frontend . || echo "No frontend dockerfile"
          docker tag ${PROJECT_NAME}-backend:${GITHUB_SHA} ${PROJECT_NAME}-backend:develop-ok-${GITHUB_SHA} || true
          docker tag ${PROJECT_NAME}-frontend:${GITHUB_SHA} ${PROJECT_NAME}-frontend:develop-ok-${GITHUB_SHA} || true
      - name: Deploy to Develop
        run: |
          docker compose -f docker-compose.yml up -d

  build-and-deploy-manual:
    runs-on: ubuntu-latest
    needs: test-and-sonar
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - name: Verify Hierarchy & Set Variables
        run: |
          echo "ENV_NAME=${{ github.event.inputs.environment }}" >> $GITHUB_ENV
          if [ "${{ github.event.inputs.environment }}" = "staging" ]; then
            if ! docker image inspect ${PROJECT_NAME}-backend:develop-ok-${GITHUB_SHA} > /dev/null 2>&1 && ! docker image inspect ${PROJECT_NAME}-frontend:develop-ok-${GITHUB_SHA} > /dev/null 2>&1; then
              echo "::error::Pipeline bloqueado: Você deve fazer o deploy em Develop antes do Staging para este commit!"
              exit 1
            fi
            echo "PORT_BACK=${{ secrets.STG_PORT_BACK }}" >> $GITHUB_ENV
            echo "PORT_FRONT=${{ secrets.STG_PORT_FRONT }}" >> $GITHUB_ENV
            docker tag ${PROJECT_NAME}-backend:${GITHUB_SHA} ${PROJECT_NAME}-backend:staging-ok-${GITHUB_SHA} || true
            docker tag ${PROJECT_NAME}-frontend:${GITHUB_SHA} ${PROJECT_NAME}-frontend:staging-ok-${GITHUB_SHA} || true
          else
            if ! docker image inspect ${PROJECT_NAME}-backend:staging-ok-${GITHUB_SHA} > /dev/null 2>&1 && ! docker image inspect ${PROJECT_NAME}-frontend:staging-ok-${GITHUB_SHA} > /dev/null 2>&1; then
              echo "::error::Pipeline bloqueado: Você deve fazer o deploy em Staging antes da Produção para este commit!"
              exit 1
            fi
            echo "PORT_BACK=${{ secrets.PRD_PORT_BACK }}" >> $GITHUB_ENV
            echo "PORT_FRONT=${{ secrets.PRD_PORT_FRONT }}" >> $GITHUB_ENV
          fi
      - name: Build Docker Images
        run: |
          docker build -t ${PROJECT_NAME}-backend:${GITHUB_SHA} -f Dockerfile.backend . || echo "No backend dockerfile"
          docker build -t ${PROJECT_NAME}-frontend:${GITHUB_SHA} -f Dockerfile.frontend . || echo "No frontend dockerfile"
      - name: Deploy to Environment
        run: |
          docker compose -f docker-compose.yml up -d
